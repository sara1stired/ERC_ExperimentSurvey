<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SuperSAFE — During-Driving Event Rating</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --normal-bg:#D8F3DC; --normal:#2D6A4F;
    --slight-bg:#FEF3C7; --slight:#B45309;
    --severe-bg:#FEE2E2; --severe:#9B1C1C;
    --confirm-bg:#DBEAFE; --confirm:#1E3A5F;
    --back-bg:#F3F4F6; --back:#374151;
    --yes-bg:#D1FAE5; --yes:#065F46;
    --no-bg:#FEE2E2; --no:#991B1B;
    --perception-bg:#DBEAFE; --perception:#1E40AF;
    --comprehension-bg:#CCFBF1; --comprehension:#0F766E;
    --decision-bg:#F3E8FF; --decision:#6B21A8;
    --operation-bg:#FEF3C7; --operation:#92400E;
  }

  html, body { height: 100%; }
  body {
    background: #000; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; touch-action: manipulation;
  }

  .screen {
    display: none; width: 100vw; height: 100vh;
    flex-direction: column; align-items: center; justify-content: center;
    position: absolute; top: 0; left: 0;
  }
  .screen.active { display: flex; }

  .card {
    background: #fff; border-radius: 28px; padding: 40px 40px;
    width: min(780px, 92vw); display: flex; flex-direction: column; gap: 26px;
  }

  .card.card-wide { width: min(1000px, 95vw); }

  .step-label {
    font-size: 14px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: #9CA3AF; text-align: center;
  }
  .event-info { text-align: center; font-size: 16px; color: #6B7280; }
  .event-info strong { color: #111; font-weight: 700; }

  /* ---- Severity: three columns ---- */
  .sev-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .big-btn {
    border: none; border-radius: 18px; font-family: inherit; cursor: pointer;
    outline: none; -webkit-appearance: none; appearance: none; user-select: none;
    touch-action: manipulation; display: flex; align-items: center; justify-content: center;
    text-align: center; transition: opacity .08s, transform .08s;
  }
  .big-btn:active { opacity: .75; transform: scale(.97); }
  .sev-btn { padding: 40px 12px; min-height: 168px; font-size: clamp(28px, 4.4vw, 42px); font-weight: 700; line-height: 1.05; }
  .btn-normal { background: var(--normal-bg); color: var(--normal); }
  .btn-slight { background: var(--slight-bg); color: var(--slight); }
  .btn-severe { background: var(--severe-bg); color: var(--severe); }

  /* ---- Comfort: two columns ---- */
  .comfort-q { font-size: 23px; font-weight: 600; color: #111; text-align: center; line-height: 1.4; }
  .yesno-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .yesno-btn { padding: 44px 16px; min-height: 150px; font-size: clamp(30px, 4.6vw, 44px); font-weight: 700; }
  .btn-yes { background: var(--yes-bg); color: var(--yes); }
  .btn-no  { background: var(--no-bg);  color: var(--no); }

  .util-btn { padding: 18px; font-size: 19px; font-weight: 700; width: 100%; }
  .btn-back    { background: var(--back-bg);    color: var(--back); }
  .btn-confirm { background: var(--confirm-bg); color: var(--confirm); }

  .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .nav-row .full { grid-column: 1 / -1; }

  /* ---- Error: three columns ---- */
  .error-q { font-size: 21px; font-weight: 700; color: #111; text-align: center; }
  .err-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .error-btn {
    position: relative; border: 2.5px solid transparent; border-radius: 16px;
    padding: 24px 14px; font-family: inherit; cursor: pointer; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    min-height: 184px; justify-content: center;
    outline: none; -webkit-appearance: none; appearance: none;
    touch-action: manipulation; transition: opacity .08s, border-color .12s;
  }
  .error-btn:active { opacity: .75; }
  .err-emoji { font-size: 44px; line-height: 1; }
  .err-desc  { font-size: 16px; font-weight: 700; line-height: 1.25; }
  .err-tag   { margin-top: auto; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; opacity: .6; }
  .error-btn.perception { background: var(--perception-bg); color: var(--perception); }
  .error-btn.comprehension { background: var(--comprehension-bg); color: var(--comprehension); }
  .error-btn.decision   { background: var(--decision-bg);   color: var(--decision); }
  .error-btn.operation  { background: var(--operation-bg);  color: var(--operation); }
  .error-btn.selected { border-color: currentColor; }
  .checkmark {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700;
  }

  /* ---- Standby ---- */
  #screen-standby { background: #000; cursor: default; gap: 24px; }
  .ready-dot { width: 22px; height: 22px; border-radius: 50%; background: #34D399; animation: pulse 2.2s ease-in-out infinite; }
  .ready-cap { font-size: 14px; font-weight: 600; color: #9CA3AF; letter-spacing: .16em; text-transform: uppercase; }
  @keyframes pulse {
    0%,100% { opacity: .55; box-shadow: 0 0 0 0 rgba(52,211,153,.45); }
    50%     { opacity: 1;   box-shadow: 0 0 26px 7px rgba(52,211,153,.45); }
  }

  /* ---- Done ---- */
  #screen-done { background: #000; overflow-y: auto; align-items: flex-start; padding: 60px 20px 120px; }
  .done-card { background: #fff; border-radius: 24px; padding: 32px 28px; width: min(680px, 94vw); margin: 0 auto; }
  .done-title { font-size: 19px; font-weight: 700; color: #111; margin-bottom: 16px; }
  .done-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .done-table th { text-align: left; color: #9CA3AF; font-weight: 600; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; padding: 6px; }
  .done-table td { padding: 10px 6px; color: #111; border-top: 1px solid #F3F4F6; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge-normal { background: var(--normal-bg); color: var(--normal); }
  .badge-slight { background: var(--slight-bg); color: var(--slight); }
  .badge-severe { background: var(--severe-bg); color: var(--severe); }

  /* ---- Experimenter panel ---- */
  #exp-panel {
    position: fixed; bottom: 0; left: 0; right: 0; background: #111;
    border-top: 1px solid #222; padding: 12px 20px calc(18px + env(safe-area-inset-bottom));
    display: flex; align-items: center; gap: 10px; z-index: 999; flex-wrap: wrap;
  }
  #exp-panel label { color: #9CA3AF; font-size: 13px; white-space: nowrap; }
  #exp-panel input[type=number] {
    background: #1f1f1f; border: 1px solid #333; color: #fff; border-radius: 8px;
    padding: 9px 10px; font-size: 14px; font-family: inherit; width: 64px;
    -webkit-appearance: none; appearance: none;
  }
  #btn-trigger {
    margin-left: auto; background: #2563EB; color: #fff; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
  }
  #btn-export {
    background: #065F46; color: #fff; border: none; border-radius: 10px;
    padding: 11px 18px; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
  }
  .panel-hidden { display: none !important; }
</style>
</head>
<body>

<!-- STANDBY -->
<div class="screen active" id="screen-standby">
  <div class="ready-dot"></div>
  <div class="ready-cap">Ready — awaiting next event</div>
</div>

<!-- SEVERITY -->
<div class="screen" id="screen-severity">
  <div class="card">
    <div class="comfort-q">How risky was that event?</div>
    <div class="sev-grid">
      <button class="big-btn sev-btn btn-normal" id="btn-normal">Normal</button>
      <button class="big-btn sev-btn btn-slight" id="btn-slight">Slight</button>
      <button class="big-btn sev-btn btn-severe" id="btn-severe">Severe</button>
    </div>
  </div>
</div>

<!-- COMFORT -->
<div class="screen" id="screen-comfort">
  <div class="card">
    <div class="comfort-q">Were you able to handle this situation?</div>
    <div class="yesno-grid">
      <button class="big-btn yesno-btn btn-yes" id="btn-yes">Yes</button>
      <button class="big-btn yesno-btn btn-no"  id="btn-no">No</button>
    </div>
    <button class="big-btn util-btn btn-back" id="btn-back-comfort">← Back</button>
  </div>
</div>

<!-- ERROR -->
<div class="screen" id="screen-error">
  <div class="card card-wide">
    <div class="error-q">What made it difficult? Select all that apply</div>
    <div class="err-grid">
      <button class="error-btn perception" id="err-perception">
        <span class="err-emoji">👀</span>
        <span class="err-desc">Didn't notice it</span>
        <div class="checkmark" id="chk-perception"></div>
      </button>
      <button class="error-btn comprehension" id="err-comprehension">
        <span class="err-emoji">🤨</span>
        <span class="err-desc">Misunderstood it</span>
        <div class="checkmark" id="chk-comprehension"></div>
      </button>
      <button class="error-btn decision" id="err-decision">
        <span class="err-emoji">🤔</span>
        <span class="err-desc">Didn't know what to do</span>
        <div class="checkmark" id="chk-decision"></div>
      </button>
      <button class="error-btn operation" id="err-operation">
        <span class="err-emoji">⏱️</span>
        <span class="err-desc">Couldn't act in time</span>
        <div class="checkmark" id="chk-operation"></div>
      </button>
    </div>
    <div class="nav-row">
      <button class="big-btn util-btn btn-back"    id="btn-back-error">← Back</button>
      <button class="big-btn util-btn btn-confirm" id="btn-confirm-error">Confirm</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="screen" id="screen-confirm">
  <div class="card">
    <div class="step-label">Confirm response</div>
    <div style="text-align:center; font-size:22px; font-weight:600; color:#111;" id="confirm-summary"></div>
    <div class="nav-row">
      <button class="big-btn util-btn btn-back"    id="btn-back-confirm">← Back</button>
      <button class="big-btn util-btn btn-confirm" id="btn-confirm-yes">Confirm</button>
    </div>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="screen-done">
  <div class="done-card">
    <div class="done-title">Recorded responses</div>
    <table class="done-table">
      <thead>
        <tr><th>Sc.</th><th>Ev.</th><th>Severity</th><th>Comfortable</th><th>Error type</th><th>Time</th></tr>
      </thead>
      <tbody id="done-tbody"></tbody>
    </table>
    <div style="margin-top:20px;">
      <button class="big-btn util-btn btn-back" id="btn-done-back" style="font-size:16px; padding:14px;">← Back to standby</button>
    </div>
  </div>
</div>

<!-- EXPERIMENTER PANEL -->
<div id="exp-panel">
  <label>Scenario</label>
  <input type="number" id="inp-scenario" value="1" min="1" max="99">
  <label>Event</label>
  <input type="number" id="inp-event" value="1" min="1" max="99">
  <button id="btn-trigger">▶ Trigger event</button>
  <button id="btn-export">Export CSV</button>
</div>

<script>
  var state = { scenario: 1, event: 1, severity: null, comfortable: null, errors: { perception:false, comprehension:false, decision:false, operation:false } };
  var log = [];
  var panel = document.getElementById('exp-panel');

  function showScreen(id) {
    var s = document.querySelectorAll('.screen');
    for (var i=0;i<s.length;i++) s[i].classList.remove('active');
    document.getElementById('screen-'+id).classList.add('active');
    // hide experimenter chrome on the participant-facing done screen
    panel.classList.toggle('panel-hidden', id === 'done');
  }

  function resetErrors() {
    state.errors = { perception:false, comprehension:false, decision:false, operation:false };
    ['perception','comprehension','decision','operation'].forEach(function(t){
      document.getElementById('err-'+t).classList.remove('selected');
      document.getElementById('chk-'+t).textContent = '';
    });
  }
  function toggleError(t) {
    state.errors[t] = !state.errors[t];
    var b = document.getElementById('err-'+t), c = document.getElementById('chk-'+t);
    if (state.errors[t]) { b.classList.add('selected'); c.textContent = '✓'; }
    else { b.classList.remove('selected'); c.textContent = ''; }
  }

  function confirmEntry() {
    var ts = new Date().toISOString();
    var et = Object.keys(state.errors).filter(function(k){return state.errors[k];}).join('+') || '—';
    log.push({
      scenario: state.scenario, event: state.event, severity: state.severity,
      comfortable: state.comfortable ? 'Yes' : 'No',
      errors: state.comfortable ? '—' : et, timestamp: ts
    });
    updateTable();
    showScreen('standby');
  }

  function updateTable() {
    document.getElementById('done-tbody').innerHTML = log.map(function(r){
      return '<tr>'+
        '<td>'+r.scenario+'</td>'+
        '<td>'+r.event+'</td>'+
        '<td><span class="badge badge-'+r.severity.toLowerCase()+'">'+r.severity+'</span></td>'+
        '<td>'+r.comfortable+'</td>'+
        '<td style="color:#6B7280;">'+r.errors+'</td>'+
        '<td style="color:#9CA3AF;">'+r.timestamp.slice(11,19)+'</td>'+
      '</tr>';
    }).join('');
  }

  function exportCSV() {
    if (log.length === 0) { alert('No data recorded yet.'); return; }
    var rows = ['Scenario,Event,Severity,Comfortable,ErrorType,Timestamp'];
    log.forEach(function(r){ rows.push([r.scenario,r.event,r.severity,r.comfortable,r.errors,r.timestamp].join(',')); });
    var blob = new Blob([rows.join('\n')], { type:'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'driving_events.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function addTap(id, fn) {
    var el = document.getElementById(id);
    el.addEventListener('touchend', function(e){ e.preventDefault(); fn(); });
    el.addEventListener('click', fn);
  }

  function startEvent() {
    state.scenario = parseInt(document.getElementById('inp-scenario').value) || 1;
    state.event    = parseInt(document.getElementById('inp-event').value) || 1;
    state.severity = null; state.comfortable = null;
    resetErrors();
    showScreen('severity');
    document.getElementById('inp-event').value = state.event + 1; // auto-advance
  }
  addTap('btn-trigger', startEvent);

  addTap('btn-normal', function(){ state.severity='Normal'; goComfort(); });
  addTap('btn-slight', function(){ state.severity='Slight'; goComfort(); });
  addTap('btn-severe', function(){ state.severity='Severe'; goComfort(); });

  function goComfort() {
    showScreen('comfort');
  }

  addTap('btn-yes', function(){
    state.comfortable = true;
    document.getElementById('confirm-summary').textContent = state.severity + ' · Yes, I handled it well';
    showScreen('confirm');
  });
  addTap('btn-no', function(){ state.comfortable = false; showScreen('error'); });
  addTap('btn-back-comfort', function(){ showScreen('severity'); });

  addTap('err-perception', function(){ toggleError('perception'); });
  addTap('err-comprehension', function(){ toggleError('comprehension'); });
  addTap('err-decision',   function(){ toggleError('decision'); });
  addTap('err-operation',  function(){ toggleError('operation'); });
  addTap('btn-back-error', function(){ showScreen('comfort'); });
  addTap('btn-confirm-error', confirmEntry);

  addTap('btn-back-confirm', function(){ showScreen('comfort'); });
  addTap('btn-confirm-yes', confirmEntry);
  addTap('btn-done-back', function(){ showScreen('standby'); });

  document.getElementById('btn-export').addEventListener('touchend', function(e){ e.preventDefault(); exportCSV(); });
  document.getElementById('btn-export').addEventListener('click', exportCSV);

  // 5-tap on standby reveals the data table
  var tapCount = 0;
  function standbyTap() {
    tapCount++;
    if (tapCount >= 5) { tapCount = 0; updateTable(); showScreen('done'); }
    setTimeout(function(){ tapCount = 0; }, 1500);
  }
  var sb = document.getElementById('screen-standby');
  sb.addEventListener('touchend', function(e){ e.preventDefault(); standbyTap(); });
  sb.addEventListener('click', standbyTap);
</script>
</body>
</html>
